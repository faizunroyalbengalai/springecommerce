---
- name: Deploy springecommerce
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    app_port: 8080
    project: 'springecommerce'
    web_server: 'nginx'
    python_version: '3.11'
    entrypoint: 'app.main:app'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # ── Java runtime ──────────────────────────────────────────────────────────
    - name: Install Java 21
      apt:
        name: openjdk-21-jre-headless
        state: present

    # ── Web server (nginx / apache / none) ────────────────────────────────────
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent


    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: preserve
      notify: Restart app

    - name: Build application JAR
      shell: |
        cd {{ app_dir }}
        chmod +x mvnw
        ./mvnw package -DskipTests -q
      args:
        executable: /bin/bash

    - name: Create .env file
      shell: |
        printf '' > {{ app_dir }}/.env
        [ -n "$DATABASE_URL" ] && printf 'DATABASE_URL=%s\n' "$DATABASE_URL" >> {{ app_dir }}/.env || true
        printf 'PORT={{ app_port }}\nAPP_ENV=production\n' >> {{ app_dir }}/.env
      args:
        executable: /bin/bash

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description={{ project }} Spring Boot app
          After=network.target

          [Service]
          User=root
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart=/usr/bin/java -jar {{ app_dir }}/target/*.jar --server.port={{ app_port }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start app service
      systemd:
        name: app
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Reload and start web server
      service:
        name: "{{ web_server if web_server not in ('none', 'skip', 'no', '') else 'nginx' }}"
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      systemd:
        name: app
        state: restarted